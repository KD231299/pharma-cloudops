events {}

http {
    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        #  Serve static files properly
        location / {
            try_files $uri $uri/ =404;
        }

        #  Fallback for SPA (only if needed)
        location /app {
            try_files $uri /index.html;
        }
    }
}