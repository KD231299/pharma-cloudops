apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharma-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pharma
  template:
    metadata:
      labels:
        app: pharma
    spec:
      containers:
      - name: pharma-container
        image: kd231299/pharma-cloudops:latest
        ports:
        - containerPort: 80    